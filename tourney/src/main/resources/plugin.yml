name: Tourney
version: '${version}'
main: com.samarth.tourney.TourneyPlugin
api-version: '1.21'
authors: [Samarth]
description: Automatic 1v1 tournament plugin (first-to-N-kills bracket)
softdepend: [PvPTLStats, PvPTLKits]

commands:
  tourney:
    description: Tournament command
    aliases: [tournament, tour]
    usage: /tourney start <kit> [join=N] [rounds=N] [freeze=N] [cap=N] | join | leave | cancel | bracket | spectate | setup

permissions:
  tourney.use:
    description: Allows joining/leaving and viewing tournaments
    default: true
  tourney.start:
    description: Allows starting a tournament
    default: op
  tourney.cancel:
    description: Allows cancelling a tournament
    default: op
  tourney.setup:
    description: Allows configuring arenas and lobby
    default: op

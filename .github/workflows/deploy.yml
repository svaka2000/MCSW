name: Deploy to Minecraft server

# Uploads built JARs to your Minecraft server's plugins/ folder via SFTP.
# Designed for managed Minecraft hosts (Apex, GravelHost, Shockbyte, etc.)
# that expose SFTP but no SSH shell.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets and variables → Actions):
#   MC_SERVER_HOST     — hostname (e.g. prla2.gravelhost.com)
#   MC_SERVER_USER     — SFTP username from the host panel
#   MC_SERVER_PASSWORD — SFTP password (often = panel password)
#   MC_SERVER_PORT     — SFTP port (e.g. 2022 for GravelHost)
#   MC_PLUGINS_PATH    — absolute path to plugins folder (e.g. /plugins)
#
# After upload, the host server keeps running the OLD jars until you restart
# or /reload from the panel console. Plugin configs (plugins/<Name>/config.yml)
# are NOT touched — only the JARs are replaced.

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JARs
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon
          mkdir -p dist
          # Use the *-dev.jar suffix specifically — stats and kits also build a
          # *-sources.jar (via withSourcesJar()), which would make the glob ambiguous.
          cp tourney/build/libs/Tourney-*-dev.jar dist/Tourney.jar
          cp duels/build/libs/Duels-*-dev.jar dist/Duels.jar
          cp aihelp/build/libs/AIHelp-*-dev.jar dist/AIHelp.jar
          cp stats/build/libs/PvPTLStats-*-dev.jar dist/PvPTLStats.jar
          cp kits/build/libs/PvPTLKits-*-dev.jar dist/PvPTLKits.jar
          cp parties/build/libs/PvPTLParties-*-dev.jar dist/PvPTLParties.jar
          ls -la dist/

      - name: Check deploy secrets are configured
        id: check
        run: |
          if [ -z "${{ secrets.MC_SERVER_HOST }}" ] || [ -z "${{ secrets.MC_SERVER_USER }}" ] \
             || [ -z "${{ secrets.MC_SERVER_PASSWORD }}" ] || [ -z "${{ secrets.MC_PLUGINS_PATH }}" ]; then
            echo "::warning::Deploy secrets not set; skipping server upload. See DEPLOY.md."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload JARs to server (SFTP via curl)
        if: steps.check.outputs.skip == 'false'
        env:
          HOST: ${{ secrets.MC_SERVER_HOST }}
          USER: ${{ secrets.MC_SERVER_USER }}
          PASS: ${{ secrets.MC_SERVER_PASSWORD }}
          PORT: ${{ secrets.MC_SERVER_PORT }}
          DEST: ${{ secrets.MC_PLUGINS_PATH }}
        run: |
          set -euo pipefail
          # GravelHost (and most managed Minecraft hosts) expose SFTP but not the
          # legacy SCP wire protocol that appleboy/scp-action uses. curl on the
          # GitHub Actions runner is built with libssh2 and speaks SFTP directly,
          # which is what these hosts actually accept.
          DEST_CLEAN="${DEST%/}"
          for f in dist/*.jar; do
            name=$(basename "$f")
            echo "→ Uploading $name to $HOST:$DEST_CLEAN/$name"
            curl --silent --show-error --fail \
                 --insecure \
                 --user "$USER:$PASS" \
                 --upload-file "$f" \
                 "sftp://$HOST:$PORT$DEST_CLEAN/$name"
            echo "  ✓ $name"
          done
          echo "All JARs uploaded."

      - name: Summary
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "✓ JARs uploaded to ${{ secrets.MC_SERVER_HOST }}:${{ secrets.MC_PLUGINS_PATH }}"
          echo "⚠ You must /reload or restart the server from the panel console to load the new JARs."

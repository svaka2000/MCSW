name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all modules
        run: ./gradlew build --no-daemon

      - name: Stage built JARs
        run: |
          mkdir -p dist
          cp tourney/build/libs/Tourney-*.jar dist/Tourney.jar
          cp duels/build/libs/Duels-*.jar dist/Duels.jar
          cp aihelp/build/libs/AIHelp-*.jar dist/AIHelp.jar
          ls -la dist/

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: pvptl-plugins-${{ github.sha }}
          path: dist/*.jar
          retention-days: 30
